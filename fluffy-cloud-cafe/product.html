<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Fluffy Cloud Cafe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-section {
            padding: 8rem 1.5rem 4rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: flex-start;
        }

        .product-img-wrap {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            background: #fff;
        }

        .product-img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-mid);
            font-family: var(--font-main);
            font-weight: 500;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        .product-title {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 0.5rem;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .product-price {
            font-family: var(--font-main);
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .product-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-mid);
            margin-bottom: 2rem;
        }

        .product-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        @media (max-width: 992px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-img-wrap {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        @media (max-width: 480px) {
            .product-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .qty-control {
                justify-content: space-between;
                width: 100%;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>

<body>

        <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-cloud"></i> <span>Fluffy Cloud</span> Cafe
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="reviews.html" class="nav-link">Reviews</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="admin/index.html" class="btn btn-secondary btn-sm" title="Admin Panel"><i class="fas fa-user-shield"></i> Admin</a>
                <a href="cart.html" class="cart-btn">
                    <i class="fas fa-shopping-bag"></i> Cart
                    <span class="cart-count" style="display:none;">0</span>
                </a>
            </div>
            <button class="hamburger">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Nav Overlay -->
    <div class="mobile-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="reviews.html" class="nav-link">Reviews</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="cart.html" class="nav-link">Cart (<span class="cart-count">0</span>)</a>
        <a href="admin/index.html" class="nav-link">Admin Panel</a>
    </div>

    <section class="product-section">
        <div class="container">
            <a href="menu.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Menu</a>

            <div class="product-grid" id="productContainer">
                <!-- Rendered by JS -->
                <div class="skeleton" style="height: 400px; border-radius: var(--radius-xl);"></div>
                <div>
                    <div class="skeleton mb-1" style="height: 40px; width: 60%;"></div>
                    <div class="skeleton mb-2" style="height: 20px; width: 30%;"></div>
                    <div class="skeleton mb-2" style="height: 100px; width: 100%;"></div>
                    <div class="skeleton" style="height: 50px; width: 200px;"></div>
                </div>
            </div>

        </div>
    </section>

    <!-- Bottom Cart Bar -->
    <div class="bottom-cart-bar" id="bottomCartBar">
        <div class="d-flex align-center gap-1">
            <i class="fas fa-shopping-bag"></i>
            <div>
                <div class="bc-count" style="font-size: 0.8rem;">0 items</div>
                <div class="bc-total">₹0.00</div>
            </div>
        </div>
        <a href="cart.html" class="btn btn-accent btn-sm">View Cart</a>
    </div>

    <footer class="footer mt-4">
        <div class="footer-bottom">
            &copy; 2026 Fluffy Cloud Cafe. All rights reserved.
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('productContainer');

            const product = MENU_DATA.find(p => p.id === id) || MENU_DATA[0];

            let localQty = 1;

            function render() {
                container.innerHTML = `
          <div class="product-img-wrap" data-aos="fadeRight">
            <span class="badge ${product.badge ? 'badge-primary' : 'badge-accent'}" style="position:absolute; top:1.5rem; right:1.5rem; z-index:10; font-size:1rem; padding:0.5rem 1rem;">
              ${product.badge || product.cat.toUpperCase()}
            </span>
            <img src="${product.img}" alt="${product.name}" class="product-img" id="mainImg">
          </div>
          <div data-aos="fadeLeft">
            <h1 class="product-title section-title">${product.name}</h1>
            <div class="product-rating">
              ${renderStars(4.8)} (128 reviews)
            </div>
            <div class="product-price">${formatPrice(product.price)}</div>
            <p class="product-desc">${product.desc} Every cup is prepared with love and premium ingredients to ensure you have the sweetest moment possible.</p>
            
            <div class="form-group">
              <label class="form-label">Special Instructions (Optional)</label>
              <textarea class="form-textarea" id="instructionInput" placeholder="E.g., Extra hot, less ice, allergy info..."></textarea>
            </div>

            <div class="product-actions">
              <div class="qty-control">
                <button class="qty-btn" id="btnMinus"><i class="fas fa-minus"></i></button>
                <span class="qty-val" id="qtyVal">${localQty}</span>
                <button class="qty-btn" id="btnPlus"><i class="fas fa-plus"></i></button>
              </div>
              
              <button class="btn btn-primary btn-lg" id="btnAddCart" style="flex:1;">
                <i class="fas fa-shopping-bag"></i> Add to Cart <span id="addTotal"> - ${formatPrice(product.price * localQty)}</span>
              </button>
            </div>
          </div>
        `;

                // Event Listeners
                document.getElementById('btnMinus').addEventListener('click', () => {
                    if (localQty > 1) { localQty--; updateQty(); }
                });
                document.getElementById('btnPlus').addEventListener('click', () => {
                    localQty++; updateQty();
                });
                document.getElementById('btnAddCart').addEventListener('click', () => {
                    for (let i = 0; i < localQty; i++) {
                        Cart.addItem({
                            id: product.id,
                            name: product.name,
                            price: product.price,
                            img: product.img
                        });
                    }
                    // Optional: redirect to cart or show modal
                });
            }

            function updateQty() {
                document.getElementById('qtyVal').textContent = localQty;
                document.getElementById('addTotal').textContent = ` - ${formatPrice(product.price * localQty)}`;
            }

            // Simulate loading for Skeleton effect
            setTimeout(() => {
                render();
            }, 400);

        });
    </script>
</body>

</html>
